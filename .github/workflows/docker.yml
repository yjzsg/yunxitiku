name: Build Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - public/**
      - src/**
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/yjzsg/yunxitiku

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore and verify
        run: |
          dotnet restore src/YunxiTiku.Web/YunxiTiku.Web.csproj
          dotnet build src/YunxiTiku.Web/YunxiTiku.Web.csproj -c Release --no-restore
          dotnet list src/YunxiTiku.Web/YunxiTiku.Web.csproj package --vulnerable --include-transitive | tee vulnerable.txt
          if grep -Eiq 'has the following vulnerable packages|具有下列易受攻击的包' vulnerable.txt; then exit 1; fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
