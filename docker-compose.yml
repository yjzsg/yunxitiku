services:
  yunxi-tiku:
    build:
      context: https://github.com/yjzsg/yunxitiku.git#main
      dockerfile: Dockerfile
    container_name: yunxi-tiku
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./userdata:/app/userdata
    environment:
      App__SqlitePath: /app/data/question-bank.db
      App__DataAssetsRoot: /app/data/assets
      App__UserDataRoot: /app/userdata
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/api/health | grep -q '\"sqlite\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
